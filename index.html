<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

    <!-- Header -->
    <div class="header">
        <h1>TO-DO LIST</h1>
        <!-- <span class="header-tag">/ track your work</span> -->
    </div>

     <!-- Input -->
        <div class="input">
            <input type="text" id="taskInput" placeholder="Add a new task..." required>
            <button id="addTaskBtn" onclick="addItem()">+ Add</button>
        </div>

    <!-- Counter -->
    <div class="counter">
        <div class="box">
            <h1 id="all">0</h1>
            <p>Total</p>
        </div>
        <div class="box">
            <h1 id="pending">0</h1>
            <p>Pending</p>
        </div>
        <div class="box">
            <h1 id="Completed">0</h1>
            <p>Done</p>
        </div>
    </div>

     <!-- Task List -->
    <div class="taskList">
        <div class="taskList-header">
            <h3>Tasks</h3>
            <div class="list"></div>
            <button class="clear-btn">Clear All</button>
        </div>
        <div class="list">
            <ul id="taskList">
            </ul>
        </div>
    </div>
    </div>
</body>
    <script src="logic.js"></script>
</html>
